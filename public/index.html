<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" sizes="48x48" href="/falcon_logo.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Falcon Engineers India - Leading manufacturer of grinding wheels, diamond dressers and cutting tools. Falcon Engineers offers engineering solutions and industrial abrasives across India and globally."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/falcon_logo.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- SEO keywords for search engines -->
    <meta name="keywords" content="falcon, falcon engg, falcon engineers, falcon engineering, falcon engineers india, falconengg, falcon engineering india, falcon eng, falcon-engg, falconengg.in" />
    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Falcon Engineers India" />
    <meta property="og:description" content="Leading manufacturer of grinding wheels, diamond dressers and cutting tools. Falcon Engineers provides engineering solutions and industrial abrasives." />
    <meta property="og:url" content="https://falconengg.in" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://falconengg.in/falcon_logo.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Falcon Engineers India" />
    <meta name="twitter:description" content="Leading manufacturer of grinding wheels, diamond dressers and cutting tools." />
    <meta name="twitter:image" content="https://falconengg.in/falcon_logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Inter", sans-serif;
      }
    </style>
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Website Designers Jaipur</title>
    <!-- Schema.org JSON-LD for organization with logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Falcon Engineers India",
      "url": "https://falconengg.in",
      "logo": "https://falconengg.in/falcon_logo.png",
      "sameAs": [
        "https://www.linkedin.com/company/falcon-engineers-india",
        "https://www.facebook.com/falconengg",
        "https://twitter.com/falconengg"
      ]
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
